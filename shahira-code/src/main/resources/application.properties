spring.application.name=codeviz

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/codeviz_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=${DB_DRIVER:org.postgresql.Driver}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

spring.h2.console.enabled=false

app.auth.google.client-id=540051593546-q13a5gco79jf9p7d0t140bqfnabl1rn4.apps.googleusercontent.com

# Self-hosted Piston endpoint (override with APP_PISTON_EXECUTE_URL or app.piston.execute-url)
app.piston.execute-url=${APP_PISTON_EXECUTE_URL:http://localhost:2000/api/v2/execute}
